services:
  - type: web
    name: nutrisense-backend
    env: docker
    dockerfilePath: ./FastAPI_Backend/Dockerfile
    plan: starter
    envVars:
      - key: PYTHONUNBUFFERED
        value: true
      - key: PYTHONDONTWRITEBYTECODE
        value: true
    healthCheckPath: /health
    buildCommand:
    startCommand:
    
  - type: web
    name: nutrisense-frontend
    env: docker
    dockerfilePath: ./Streamlit_Frontend/Dockerfile
    plan: starter
    envVars:
      - key: PYTHONUNBUFFERED
        value: true
      - key: PYTHONDONTWRITEBYTECODE
        value: true
      - key: STREAMLIT_SERVER_PORT
        value: 8501
    healthCheckPath: /_stcore/health
    buildCommand:
    startCommand:
